services:
    backend:
        build:
            context: ./backend
        environment:
            DJANGO_DEBUG: "true"
            DJANGO_SECRET_KEY: "change-me-in-prod"
            JWT_SIGNING_KEY: "change-me-in-prod"
            DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend,gateway"
            CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:3000,http://localhost:8080"
            CSRF_TRUSTED_ORIGINS: "http://localhost,http://localhost:3000,http://localhost:8080"
        volumes:
            - backend_db:/app
            - backend_media:/app/media
            # Mount the programmatic builder so seed_demo can import it.
            - ./vn-builder:/vn-builder:ro
        # The container expects vn-builder under /<project>/vn-builder; the
        # seed_demo command searches PROJECT_ROOT/vn-builder/python.
        # We add a symlink during startup.
        entrypoint:
            - sh
            - -c
            - |
                ln -sf /vn-builder /app/../vn-builder 2>/dev/null || true
                exec "$@"
            - --
        command:
            - sh
            - -c
            - |
                python manage.py migrate --noinput && \
                python manage.py seed_demo || true
                if [ "$$DJANGO_DEBUG" = "true" ]; then
                    python manage.py runserver 0.0.0.0:8000
                else
                    gunicorn visual_novels.wsgi:application --bind 0.0.0.0:8000 --workers 3
                fi
        ports:
            - "8000:8000"

    frontend:
        build:
            context: ./web
            args:
                REACT_APP_API_URL: "http://localhost:8080/api"
        depends_on:
            - backend

    gateway:
        image: nginx:1.27-alpine
        depends_on:
            - backend
            - frontend
        ports:
            - "8080:80"
        volumes:
            - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
    backend_db:
    backend_media:

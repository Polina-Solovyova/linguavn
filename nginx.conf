# Reverse-proxy gateway: serves the SPA on /, forwards /api and /media/
# to the Django backend, and forwards /admin/, /static/admin/, /swagger/.
# Used by docker-compose.

upstream backend_upstream {
    server backend:8000;
}

upstream frontend_upstream {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # API
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media (uploaded covers, scenarios, avatars)
    location /media/ {
        proxy_pass http://backend_upstream;
    }

    # Django admin & DRF/Swagger static
    location /admin/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
    }
    location /swagger/ { proxy_pass http://backend_upstream; }
    location /redoc/   { proxy_pass http://backend_upstream; }
    location /static/admin/   { proxy_pass http://backend_upstream; }
    location /static/rest_framework/ { proxy_pass http://backend_upstream; }
    location /static/drf-yasg/ { proxy_pass http://backend_upstream; }

    # Everything else → SPA
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
    }
}
